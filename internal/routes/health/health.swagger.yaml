openapi: 3.0.3
info:
  title: Health API
  description: 服务健康检查接口
  version: 1.0.0

servers:
  - url: http://localhost:8080/api
    description: 本地开发环境

paths:
  /health:
    get:
      summary: 健康检查
      description: 检查服务运行状态
      operationId: getHealth
      tags:
        - Health
      responses:
        '200':
          description: 服务正常
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '500':
          description: 服务异常
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          description: 健康状态
          example: healthy
      example:
        status: healthy
